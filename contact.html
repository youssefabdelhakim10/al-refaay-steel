            <li><a href="contact.html">اتصل بنا</a></li>

    <div style="padding: 80px 10%;">
        <h2 style="color: var(--primary); text-align: center; margin-bottom: 50px;">تواصل معنا</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px;">
            
            <div style="background: #111; padding: 40px; border-radius: 20px; border-right: 6px solid var(--primary);">
                <p style="margin-bottom: 20px;"><i class="fab fa-whatsapp" style="color:#25D366"></i> <b>واتساب:</b> 01019569889</p>

                <input type="tel" name="phone" placeholder="رقم الهاتف" required style="padding:15px; background:#222; border:1px solid #333; color:white;">
                <textarea name="msg" placeholder="طلبك" style="padding:15px; background:#222; border:1px solid #333; color:white; height:100px;"></textarea>
                <button type="submit" class="btn-main" style="border:none; cursor:pointer;">إرسال الآن</button>
