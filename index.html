<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرفاعي ستيل | فخر الصناعة المصرية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* CSS RESET - تنظيف المتصفح من العك القديم */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { background-color: #0a0a0a; color: white; overflow-x: hidden; }

        /* Navbar - القائمة العلوية */
        nav {
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #FF8C00;
        }

        .logo { font-size: 24px; font-weight: 900; color: white; text-decoration: none; }
        .logo span { color: #FF8C00; }

        .nav-links { display: flex; list-style: none; gap: 25px; }
        .nav-links a { color: white; text-decoration: none; font-weight: 700; transition: 0.3s; }
        .nav-links a:hover { color: #FF8C00; }

        /* Hero Section - قسم الواجهة */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('main-bg.jpg'); /* اتأكد ان الصورة اسمها كدة عندك */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 800px;
            color: #ccc;
            margin-bottom: 30px;
        }

        .cta-btn {
            background: #FF8C00;
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 900;
            font-size: 1.1rem;
            transition: 0.3s;
            border: 2px solid #FF8C00;
        }

        .cta-btn:hover { background: transparent; color: #FF8C00; }

        /* Responsive - للموبايل */
        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 15px; text-align: center; }
            .nav-links { gap: 15px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">الرفاعي <span>ستيل</span></a>
        <ul class="nav-links">
            <li><a href="#home">الرئيسية</a></li>
            <li><a href="#products">منتجاتنا</a></li>
            <li><a href="#contact">اتصل بنا</a></li>
        </ul>
    </nav>

    <header class="hero" id="home">
        <h1>الرفاعي ستيل لخدمات الحديد ومشتقاته</h1>
        <p>جودة، متانة، ثقة.. شريكك الأول في التوريدات الإنشائية والمعمارية في مصر. نحن نوفر لك أفضل خامات الحديد بأفضل الأسعار التنافسية.</p>
        <a href="#contact" class="cta-btn">اطلب مقايسة الآن</a>
    </header>

</body>
</html>
