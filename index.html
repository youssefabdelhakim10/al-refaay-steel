<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرفاعي ستيل | لتوريدات الحديد والصاج</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* كود الـ CSS جوه الـ HTML عشان نضمن ظهوره */
        :root {
            --primary-orange: #FF8C00;
            --deep-dark: #121212;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--deep-dark);
            color: white;
            font-family: 'Cairo', sans-serif;
        }

        .navbar {
            padding: 15px 50px;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-orange);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            display: flex;
            gap: 8px;
        }

        .logo span { color: var(--primary-orange); }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
        }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), 
                        url('main-bg.jpg'); /* تأكد من وجود صورة بهذا الاسم */
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: white;
        }

        .cta-button {
            padding: 15px 40px;
            background: var(--primary-orange);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">الرفاعي <span>ستيل</span></div>
        <ul class="nav-links">
            <li><a href="#">الرئيسية</a></li>
            <li><a href="#">منتجاتنا</a></li>
            <li><a href="#">اطلب الآن</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>الرفاعي ستيل لخدمات الحديد ومشتقاته</h1>
            <p>جودة، متانة، ثقة.. شريكك الأول في التوريدات الإنشائية في مصر</p>
            <a href="#" class="cta-button">ابدأ مشروعك معنا</a>
        </div>
    </header>

</body>
</html>
